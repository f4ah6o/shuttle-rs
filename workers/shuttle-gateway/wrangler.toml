name = "shuttle-gateway"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Authoritative shared event store. D1 owns projects, workspaces, events,
# event tags, project grants, and context-snapshot metadata.
[[d1_databases]]
binding = "DB"
database_name = "shuttle"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Public base URL of the deployed Worker; surfaced in MCP/OAuth metadata.
[vars]
PUBLIC_URL = ""
# Owner id associated with the bootstrap admin token. Used only to mint the
# first scoped tokens and create the first projects.
ADMIN_OWNER_ID = "owner-local"

# Secrets (set with `wrangler secret put`):
#   ADMIN_BOOTSTRAP_TOKEN  one-time admin bearer used to create projects and
#                          mint scoped personal access tokens.
