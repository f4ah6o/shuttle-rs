name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_REPO: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Shuttle release artifacts for ${GITHUB_REF_NAME}." || \
              gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi

  publish:
    needs: create-release
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Check version with cargo search
        id: check
        shell: bash
        run: |
          NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shuttle-rs") | .name')
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shuttle-rs") | .version')

          echo "Checking logic for: $NAME = \"$VERSION\""
          SEARCH_RESULT=$(CARGO_TERM_COLOR=never cargo search "$NAME" --limit 1)

          if echo "$SEARCH_RESULT" | grep -E -q "^$NAME\s*=\s*\"$VERSION\""; then
            echo "::notice::Version $VERSION is already published on crates.io. Skipping all subsequent steps."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $VERSION not found on crates.io. Proceeding."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.check.outputs.should_publish == 'true'
        run: cargo test --package shuttle-rs --all-targets --verbose

      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: cargo publish --package shuttle-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  gateway-lxc-archives:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: gateway-lxc-${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build gateway binaries
        run: cross build --release --target "${{ matrix.target }}" --bin shuttle-gateway --bin stl

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          archive="shuttle-gateway-lxc-${{ matrix.target }}"
          root="dist/${archive}/shuttle-gateway-lxc"

          install -d "${root}/bin" "${root}/etc" "${root}/systemd"
          install -m 0755 "target/${{ matrix.target }}/release/shuttle-gateway" "${root}/bin/shuttle-gateway"
          install -m 0755 "target/${{ matrix.target }}/release/stl" "${root}/bin/stl"
          install -m 0644 packaging/lxc/projects.toml.example "${root}/etc/projects.toml.example"
          install -m 0644 packaging/lxc/shuttle-gateway.env.example "${root}/etc/shuttle-gateway.env.example"
          install -m 0644 packaging/lxc/shuttle-gateway.service "${root}/systemd/shuttle-gateway.service"
          install -m 0755 packaging/lxc/install.sh "${root}/install.sh"

          tar -C "dist/${archive}" -czf "dist/${archive}.tar.gz" shuttle-gateway-lxc

      - name: Upload LXC archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/shuttle-gateway-lxc-${{ matrix.target }}.tar.gz" --clobber
