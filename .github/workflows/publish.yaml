name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Check version with cargo search
        id: check
        shell: bash
        run: |
          NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shuttle-rs") | .name')
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "shuttle-rs") | .version')

          echo "Checking logic for: $NAME = \"$VERSION\""
          SEARCH_RESULT=$(CARGO_TERM_COLOR=never cargo search "$NAME" --limit 1)

          if echo "$SEARCH_RESULT" | grep -E -q "^$NAME\s*=\s*\"$VERSION\""; then
            echo "::notice::Version $VERSION is already published on crates.io. Skipping all subsequent steps."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $VERSION not found on crates.io. Proceeding."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.check.outputs.should_publish == 'true'
        run: cargo test --package shuttle-rs --all-targets --verbose

      - name: Publish
        if: steps.check.outputs.should_publish == 'true'
        run: cargo publish --package shuttle-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
