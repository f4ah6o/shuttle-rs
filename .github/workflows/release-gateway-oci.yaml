name: Release Gateway OCI

on:
  push:
    tags:
      - 'gateway-v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shuttle-gateway

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Shuttle Gateway release artifacts for ${GITHUB_REF_NAME}." || \
              gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi

  publish-image:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker buildx
        shell: bash
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install amd64,arm64
          docker buildx create --use --name shuttle-gateway-builder

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push multi-arch image
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#gateway-v}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file packaging/oci/Containerfile \
            --tag "${IMAGE_NAME}:${version}" \
            --tag "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            --push \
            .

  release-archives:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact: linux-amd64
          - platform: linux/arm64
            artifact: linux-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker buildx
        shell: bash
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install amd64,arm64
          docker buildx create --use --name shuttle-gateway-archive-builder

      - name: Build OCI archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME#gateway-v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file packaging/oci/Containerfile \
            --tag "${IMAGE_NAME}:${version}-${{ matrix.artifact }}" \
            --output "type=oci,dest=dist/shuttle-gateway-oci-${{ matrix.artifact }}.tar" \
            .

      - name: Upload OCI archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/shuttle-gateway-oci-${{ matrix.artifact }}.tar" --clobber
