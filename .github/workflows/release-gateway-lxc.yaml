name: Release Gateway LXC

on:
  push:
    tags:
      - 'gateway-v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_REPO: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Shuttle Gateway release artifacts for ${GITHUB_REF_NAME}." || \
              gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi

  release:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: gateway-lxc-${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build gateway binaries
        run: cross build --release --target "${{ matrix.target }}" --bin shuttle-gateway --bin stl

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          archive="shuttle-gateway-lxc-${{ matrix.target }}"
          root="dist/${archive}/shuttle-gateway-lxc"

          install -d "${root}/bin" "${root}/etc" "${root}/systemd"
          install -m 0755 "target/${{ matrix.target }}/release/shuttle-gateway" "${root}/bin/shuttle-gateway"
          install -m 0755 "target/${{ matrix.target }}/release/stl" "${root}/bin/stl"
          install -m 0644 packaging/lxc/projects.toml.example "${root}/etc/projects.toml.example"
          install -m 0644 packaging/lxc/shuttle-gateway.env.example "${root}/etc/shuttle-gateway.env.example"
          install -m 0644 packaging/lxc/shuttle-gateway.service "${root}/systemd/shuttle-gateway.service"
          install -m 0755 packaging/lxc/install.sh "${root}/install.sh"

          tar -C "dist/${archive}" -czf "dist/${archive}.tar.gz" shuttle-gateway-lxc

      - name: Upload release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/shuttle-gateway-lxc-${{ matrix.target }}.tar.gz" --clobber
