[workspace]
members = [
    "crates/shuttle-core",
    "crates/shuttle-store",
    "crates/shuttle-message",
    "crates/shuttle-memory",
    "crates/shuttle-context",
    "crates/shuttle-mcp",
    "crates/shuttle-sync",
    "crates/stl",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/shuttle-rs/shuttle-rs"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive", "env"] }
rusqlite = { version = "0.31", features = ["bundled", "chrono", "uuid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "1"
uuid = { version = "1", features = ["serde", "v4"] }
futures-executor = "0.3"
